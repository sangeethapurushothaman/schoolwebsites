<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Title -->
    <title>Best School in Your Area | Quality Education & Admissions Open</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="Best school in your area offering quality education, experienced teachers, modern facilities and admissions open for the academic year."
    />

    <!-- Meta Keywords (optional but useful) -->
    <meta
      name="keywords"
      content="best school near me, school admissions, quality education, CBSE school, matriculation school"
    />

    <!-- Author -->
    <meta name="author" content="Your School Name" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Social Media SEO) -->
    <meta property="og:title" content="Best School in Your Area" />
    <meta
      property="og:description"
      content="Admissions open now. Join the best school in your area for quality education and holistic development."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.yourschoolwebsite.com" />
    <meta property="og:image" content="/school-banner.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Best School in Your Area" />
    <meta
      name="twitter:description"
      content="Quality education with modern facilities. Admissions open now."
    />
    <meta name="twitter:image" content="/school-banner.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
